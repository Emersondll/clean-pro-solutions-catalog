version: "3.9"

services:
  catalog-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: catalog-service
    ports:
      - "8083:8083"
    environment:
      MONGO_URI: mongodb://mongo:27017/catalog_db
      EUREKA_SERVER_URL: http://host.docker.internal:8761/eureka
      EUREKA_ENABLED: "true"
      SERVER_PORT: 8083
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - catalog-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongo:
    image: mongo:7.0
    container_name: catalog-mongo
    ports:
      - "27020:27017"
    volumes:
      - catalog-mongo-data:/data/db
    networks:
      - catalog-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  catalog-mongo-data:

networks:
  catalog-net:
    driver: bridge